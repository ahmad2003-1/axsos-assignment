<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>User Card</title>
</head>

<body>
    <div class="container">
        <div class="top-nav">
        </div>
        <div class="main">
            <h1>ahmad haj</h1>
            <div class="map">
                <img src="map-marker.png" alt="map-marker">
                <p>Palestine</p>
            </div>
            <p id="skills">Developer | Engineer | Problem solver</p>
            <p id="title">Master of shadows and the internet</p>
            <div class="profile">
                <img src="gear.png" alt="settings-icon">
                <p><a href="#">edit profile</a></p>
            </div>
        </div>
        <div class="user-image">
            <img src="user-circle.png" alt="User photo">
        </div>

    </div>
</body>

</html>





































<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="card-header"></div>

        <div class="card-body">
            <div class="avatar"></div>

            <h2>Jane Doe</h2>
            <p class="location">📍 Seattle</p>
            <p class="bio">
                Developer | Engineer | Problem Solver <br>
                Master of shadows and the Internet!
            </p>

            <a href="#" class="edit">⚙ edit profile</a>
        </div>
    </div>

</body>
</html>
